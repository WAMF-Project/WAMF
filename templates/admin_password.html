{% extends "admin_base.html" %} {% block title %} WAMF | Admin Password {% endblock %}
{% block content %}

<h1 class="wamf-heading">Admin Password</h1>

<div class="wamf-panel">
  <form class="admin-form" method="post" action="{{ url_for('change_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="config-message success">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    {% if error %}
      <div class="config-message error">{{ error }}</div>
    {% endif %}

    <label class="login-label" for="current_password">Current password</label>
    <input
      class="login-input"
      id="current_password"
      name="current_password"
      type="password"
      autocomplete="current-password"
      required
    />

    <label class="login-label" for="new_password">New password</label>
    <input
      class="login-input"
      id="new_password"
      name="new_password"
      type="password"
      autocomplete="new-password"
      minlength="8"
      required
    />

    <label class="login-label" for="confirm_password">Confirm new password</label>
    <input
      class="login-input"
      id="confirm_password"
      name="confirm_password"
      type="password"
      autocomplete="new-password"
      minlength="8"
      required
    />

    <button class="login-button" type="submit">Update Password</button>
  </form>
</div>

{% endblock %}
